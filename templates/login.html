{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Entrar</h2>

        {% include "partials/alert.html" %}


        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Entrar</button>
            <a href="{% url 'register' %}" class="btn btn-link">Não tem conta? Criar conta</a>
        </form>
    </div>
</div>
{% endblock %}
