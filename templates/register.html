{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Criar Conta</h2>

        {% if form.errors %}
            <div class="alert alert-danger">
                {% for field, errors in form.errors.items %}
                    {% for error in errors %}
                        <p>{{ error }}</p>
                    {% endfor %}
                {% endfor %}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }} <!-- TODO: melhorar isso aqui depois -->
            <button type="submit" class="btn btn-primary">Criar Conta</button>
            <!-- TODO: adicionar link para login -->
            <a href="/login/" class="btn btn-link">Já tem conta? Entrar</a>
        </form>
    </div>
</div>
{% endblock %}
