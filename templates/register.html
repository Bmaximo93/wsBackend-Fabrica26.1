{% extends "base.html" %}

{% block content %}

    <div class="col-md-6">
        <h2 class="mb-4">Criar Conta</h2>

        {% include "partials/alert.html" %}
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }} <!-- TODO: melhorar isso aqui depois -->

        </form>
    </div>
</div>
{% endblock %}
